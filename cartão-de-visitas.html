<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Cartão de Visita -- Flip 3D</title>

<!-- 🔗 Open Graph (WhatsApp / Facebook / Instagram preview) -->
<meta property="og:title" content="Cartão de Visita - Mateus Serranu" />
<meta property="og:description" content="Técnico em Eletrotécnica • HVAC • Preventiva. Clique para ver meu cartão digital interativo." />
<meta property="og:url" content="https://SEU-LINK-AQUI.github.io/SEU-REPO/" />
<meta property="og:type" content="website" />

<!-- 🖼️ Imagem do preview -->
<meta property="og:image" content="https://i.ibb.co/VWXvnxXg/ttu-logo.png" />
<meta property="og:image:width" content="1200" />

<style>
  :root {
    --w:320px;
    --h:200px;

    --icon-whatsapp:38px;
    --icon-instagram:30px;
    --icon-facebook:38px;
    --icon-email:28px;
    --icon-site:30px;

    --logo-size:120px;
  }

  body {
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    background:#f2f4f7;
    font-family:system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial;
  }

  .scene {
    width:var(--w);
    height:var(--h);
    perspective:1200px;
  }

  .card {
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition:transform .6s cubic-bezier(.2,.9,.3,1);
    cursor:grab;
    position:relative;
    will-change:transform;
  }

  .card.dragging {
    transition:none;
    cursor:grabbing;
  }

  .side {
    position:absolute;
    inset:0;
    border-radius:12px;
    backface-visibility:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:18px;
    box-shadow:0 8px 20px rgba(16,24,40,.08);
    font-size:14px;
    color:#0f172a;
    box-sizing:border-box;
    overflow:hidden;
  }

  .front {
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#1a1a1a,#2a2a2a);
    color:white;
    text-align:center;
    position:relative;
    overflow:hidden;
  }

  .front::before {
    content:"";
    position:absolute;
    width:110px;
    height:110px;
    background:
      radial-gradient(
        circle,
        rgba(212,175,55,.16) 0%,
        rgba(212,175,55,.07) 35%,
        rgba(212,175,55,.02) 58%,
        transparent 75%
      );
    top:38%;
    left:50%;
    transform:translate(-50%, -50%);
    filter:blur(14px);
    z-index:0;
    pointer-events:none;
  }

  .front img.logo {
    width:var(--logo-size);
    height:auto;
    border-radius:20px;
    margin-bottom:20px;
    transition:transform .2s ease;
    position:relative;
    z-index:1;
  }

  .front img.logo:hover {
    transform:scale(1.08);
  }

  .front .name {
    font-weight:700;
    font-size:14px;
    position:relative;
    z-index:1;
  }

  .front .slogan {
    font-size:10px;
    opacity:0.9;
    position:relative;
    z-index:1;
  }

  .front-whatsapp {
    position:absolute;
    top:12px;
    left:12px;
    background:white;
    padding:6px;
    border-radius:50%;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
    z-index:2;
  }

  .front-whatsapp img {
    width:32px;
    height:32px;
    transition:transform .2s ease;
    display:block;
  }

  .front-whatsapp img:hover {
    transform:scale(1.12);
  }

  .back {
    width:100%;
    height:100%;
    transform:rotateY(180deg);
    background:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:16px;
  }

  .hint {
    position:fixed;
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:#fff;
    padding:8px 12px;
    border-radius:999px;
    font-size:13px;
    opacity:.9;
  }

  @media (min-width:720px) {
    :root {
      --w:420px;
      --h:260px;
    }
  }

  .social-icons {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
  }

  .social-icons img {
    transition:transform .2s ease;
  }

  .social-icons img:hover {
    transform:scale(1.15);
  }

  .social-icons img[alt="WhatsApp"] { width:var(--icon-whatsapp); height:var(--icon-whatsapp); }
  .social-icons img[alt="Instagram"] { width:var(--icon-instagram); height:var(--icon-instagram); }
  .social-icons img[alt="Facebook"] { width:var(--icon-facebook); height:var(--icon-facebook); }
  .social-icons img[alt="E-mail"] { width:var(--icon-email); height:var(--icon-email); }
  .social-icons img[alt="Site"] { width:var(--icon-site); height:var(--icon-site); }
</style>
</head>

<body>

<div class="scene">
  <div id="card" class="card">

    <!-- FRENTE -->
    <div class="side front">

      <img class="logo"
        src="https://i.ibb.co/VWXvnxXg/ttu-logo.png"
        alt="logo"
      >

      <div class="name">Mateus Serranu</div>
      <div class="slogan">Tec.Eletrotécnica • HVAC • Preventiva</div>

      <a href="https://wa.me/5524993352912" target="_blank" class="front-whatsapp">
        <img src="https://uploads.onecompiler.io/444fns5bc/444j3hyu3/1763042745939.png" alt="WhatsApp">
      </a>

    </div>

    <!-- VERSO -->
    <div class="side back">

      <div class="social-icons">

        <a href="https://www.instagram.com/mateus_serranu?igsh=MTJ5M2lpNzllZ3ZtZg==" target="_blank">
          <img src="https://uploads.onecompiler.io/444fns5bc/444j3hyu3/1936319.png" alt="Instagram">
        </a>

        <a href="https://www.facebook.com/edmar.thomaz.1" target="_blank">
          <img src="https://uploads.onecompiler.io/444fns5bc/444j3hyu3/1763042759553.png" alt="Facebook">
        </a>

        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=ramoskrolyserranu@gmail.com" target="_blank">
          <img src="https://i.ibb.co/4wXBxWcB/gmail.png" alt="E-mail">
        </a>

        <a href="https://SEU-LINK-AQUI.github.io/SEU-REPO/" target="_blank">
          <img src="https://uploads.onecompiler.io/444fns5bc/444j3hyu3/3037366.png" alt="Site">
        </a>

      </div>

    </div>

  </div>
</div>

<div class="hint">Clique / Duplo clique para virar</div>

<script>
  const card = document.getElementById('card');

  let rotationY = 0;
  let startX = 0;
  let dragging = false;

  card.addEventListener('dblclick', () => {
    rotationY = (rotationY + 180) % 360;
    apply();
  });

  card.addEventListener('pointerdown', (e) => {
    dragging = true;
    card.classList.add('dragging');
    startX = e.clientX;
    card.setPointerCapture(e.pointerId);
  });

  window.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = e.clientX - startX;
    startX = e.clientX;
    rotationY = (rotationY + dx * 0.5) % 360;
    apply();
  });

  window.addEventListener('pointerup', () => {
    dragging = false;
    card.classList.remove('dragging');

    const normalized = ((rotationY % 360) + 360) % 360;

    rotationY = (normalized < 90 || normalized > 270) ? 0 : 180;
    apply();
  });

  function apply() {
    card.style.transform = `rotateY(${rotationY}deg)`;
  }

  apply();
</script>

</body>
</html>
